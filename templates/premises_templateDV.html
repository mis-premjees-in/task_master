<!-- To change the layout of the detail view form, we recommend using JS code in hooks/premises-dv.js rather than editing this file -->

<div id="detail-view"></div>
<div class="panel-heading"><h3 class="panel-title"><strong><%%DETAIL_VIEW_TITLE%%></strong></h3></div>

<div id="premises_dv_container-loading" class="text-center text-info text-bold vspacer-lg"><i class="glyphicon glyphicon-refresh loop-rotate"></i> <%%TRANSLATION(Loading ...)%%></div>

<div class="panel-body hidden" id="premises_dv_container">
	<!-- child links -->
	<div class="row vspacer-md">
		<div class="col-xs-12 children-links">
			<div class="clearfix"></div>
		</div>
	</div>
	<hr class="hidden-xs hidden-sm">

	<div class="row">
		<!-- form inputs -->
		<div class="col-md-8 col-lg-10" id="premises_dv_form">
			<fieldset class="form-horizontal">

				<!-- Field: Id -->
				<div class="form-group premises-premises_id">
					<hr class="hidden-md hidden-lg">
					<label class="control-label col-lg-3" for="premises_id">Id</label>
					<div class="col-lg-9">
						<div class="form-control-static" id="premises_id"><%%VALUE(premises_id)%%></div>
					</div>
				</div>

				<!-- Field: Premise Name -->
				<div class="form-group premises-premises_name">
					<hr class="hidden-md hidden-lg">
					<label class="control-label col-lg-3" for="premises_name">Premise Name<span class="text-danger"><%%TRANSLATION(*)%%></span></label>
					<div class="col-lg-9">
						<input maxlength="40" type="text" class="form-control" name="premises_name" id="premises_name" value="<%%VALUE(premises_name)%%>" required>
					</div>
				</div>

				<!-- Field: Latitude -->
				<div class="form-group premises-premises_latitude">
					<hr class="hidden-md hidden-lg">
					<label class="control-label col-lg-3" for="premises_latitude">Latitude<span class="text-danger"><%%TRANSLATION(*)%%></span></label>
					<div class="col-lg-9">
						<input maxlength="12" type="text" class="form-control" name="premises_latitude" id="premises_latitude" value="<%%VALUE(premises_latitude)%%>" required>
					</div>
				</div>

				<!-- Field: Longitude -->
				<div class="form-group premises-premises_longitude">
					<hr class="hidden-md hidden-lg">
					<label class="control-label col-lg-3" for="premises_longitude">Longitude<span class="text-danger"><%%TRANSLATION(*)%%></span></label>
					<div class="col-lg-9">
						<input maxlength="12" type="text" class="form-control" name="premises_longitude" id="premises_longitude" value="<%%VALUE(premises_longitude)%%>" required>
					</div>
				</div>

				<!-- Field: Premises radius -->
				<div class="form-group premises-premises_radius">
					<hr class="hidden-md hidden-lg">
					<label class="control-label col-lg-3" for="premises_radius">Premises radius<span class="text-danger"><%%TRANSLATION(*)%%></span></label>
					<div class="col-lg-9">
						<input maxlength="12" type="text" class="form-control" name="premises_radius" id="premises_radius" value="<%%VALUE(premises_radius)%%>" required>
					</div>
				</div>

				<!-- Field: Premises created -->
				<div class="form-group premises-premises_created">
					<hr class="hidden-md hidden-lg">
					<label class="control-label col-lg-3">Premises created</label>
					<div class="col-lg-9">
						<div class="form-control-static" id="premises_created"><%%VALUE(premises_created)%%></div>
					</div>
				</div>

				<!-- Field: Premises updated -->
				<div class="form-group premises-premises_updated">
					<hr class="hidden-md hidden-lg">
					<label class="control-label col-lg-3">Premises updated</label>
					<div class="col-lg-9">
						<div class="form-control-static" id="premises_updated"><%%VALUE(premises_updated)%%></div>
					</div>
				</div>

			</fieldset>
		</div>

		<!-- DV action buttons -->
		<hr class="hidden-md hidden-lg">
		<div class="col-md-4 col-lg-2 dv-action-buttons" id="premises_dv_action_buttons">
			<div class="btn-toolbar">
				<div class="btn-group-vertical btn-group-lg" style="width: 100%;">
					<%%UPDATE_BUTTON%%>
				</div><p></p>
				<div class="btn-group-vertical btn-group-lg" style="width: 100%;">
					<%%DESELECT_BUTTON%%>
					<%%DVPRINT_BUTTON%%>
					<%%DELETE_BUTTON%%>
				</div><p></p>
				<div class="btn-group-vertical btn-group-lg" style="width: 100%;">
					<%%INSERT_BUTTON%%>
				</div>
			</div>
		</div>
	</div>


</div><!-- /div class="panel-body" -->
	<script>
		$j(function() {
			var add_new_mode = (!$j('input[name=SelectedID]').val());
			var embedded_mode = ($j('input[name=Embedded]').val() == 1);

			/* auto-close embedded page? */
			var autoclose_mode = ($j('input[name=AutoClose]').val() == 1);
			var record_added_ok = (location.search.split('record-added-ok=').length == 2);
			var record_updated_ok = (location.search.split('record-updated-ok=').length == 2);
			if((record_added_ok || record_updated_ok) && embedded_mode && autoclose_mode) {
				setTimeout(AppGini.closeParentModal, 2000);
			}


			/* enable DV action buttons to float on scrolling down the form */
			enable_dvab_floating();

			$j('#premises_dv_container-loading').addClass('hidden');
			$j('#premises_dv_container').removeClass('hidden');
			if(!$j('.table_view').length || $j('[name=SelectedID]').val().length) AppGini.focusFormElement('premises', 'premises_name');

			$j('a[href="<%%BASE_UPLOAD_PATH%%>"]').click(function() { return false; });


			if(true /* !embedded_mode */) {
				$j('.add_new_parent').click(function() {
					const fieldId = $j(this).prevAll('input:hidden').eq(0).attr('id');
					const pt = $j(this).attr('id').replace(/_add_new$/, '');

					modal_window({
						url: `${pt}_view.php?addNew_x=1&Embedded=1`,
						close: function() {
							$j(`#${fieldId}-container`).select2('focus').select2('focus');

							/* if a new parent was added, select it */
							var new_id = AppGini.localStorage.getItem(`${pt}_last_added_id`);
							if(new_id === null) return;

							AppGini.localStorage.removeItem(`${pt}_last_added_id`);
							AppGini.lookupText({
								id: new_id,
								table: AppGini.currentTableName(),
								field: fieldId,
								callback: function(data) {
									$j(`#${fieldId}-container`).select2('data', data, true);
								}
							});
						},
						beforeClose: AppGini.confirmBeforeClosingModal,
						size: 'full',
						title: $j(this).attr('title')
					});
				});
			}

			AppGini.hideViewParentLinks();

			$j('form').on('click', '.view_parent', function() {
				const pt = $j(this).attr('id').replace(/_view_parent$/, '');
				const fieldId = $j(this).prevAll('input:hidden').eq(0).attr('id');

				let parent_id = '{empty_value}';
				if(fieldId) {
					parent_id = $j(`#${fieldId}`).val();
				} else if($j(this).prevAll('[type=radio]').length) { /* handle radio lookups */
					parent_id = $j(this).prevAll('[type=radio]').eq(0).val();
				} else {
					parent_id = $j(this).prevAll().children('input:hidden').eq(0).val();
				}

				if(parent_id != '{empty_value}' && parent_id !== undefined && parent_id !== '') {
					const parent_link = $j(this).parents('.form-group').children('label').data('parent_link');
					switch(parent_link) {
						case 'view_parent_hidden':
							break;
						case 'view_parent_modal':
							modal_window({
								url: `${pt}_view.php?Embedded=1&SelectedID=${encodeURIComponent(parent_id)}`,
								close: function() {
									$j(`#${fieldId}-container`).select2('focus').select2('focus');

									// update lookup text in case the parent record was updated
									AppGini.lookupText({
										id: parent_id,
										table: AppGini.currentTableName(),
										field: fieldId,
										cache: false,
										callback: function(data) {
											$j(`#${fieldId}-container`).select2('data', data, true);

											// update auto-fills
											const updaterName = `${fieldId}_update_autofills`;
											if(typeof(window[updaterName]) == 'function')
												window[updaterName]();
										}
									});
								},
								beforeClose: AppGini.confirmBeforeClosingModal,
								size: 'full',
								title: $j(this).attr('title')
							});
							break;
						case 'view_parent_same_window':
							window.location = `${pt}_view.php?Embedded=${embedded_mode ? '1' : ''}&SelectedID=${encodeURIComponent(parent_id)}`;
							break;
						case 'view_parent_new_window':
							window.open(`${pt}_view.php?SelectedID=${encodeURIComponent(parent_id)}`);
							break;
					}

				}
			});

			premisesUniqueFields.forEach(fieldName => enforce_uniqueness('premises', fieldName));

			/* load admin tools for admin user */
			if(!add_new_mode) {
				$j('body').append('<div id="admin-tools-appendix"></div>');
				$j('#admin-tools-appendix').load(
					'ajax_admin_tools.php?table=premises&id=<%%URLVALUE(premises_id)%%>',
					function(resp) {
						if(!resp.length) return;
						$j.ajax('ajax_admin_tools.php?action=get_admin_tools_js&table=premises&id=<%%URLVALUE(premises_id)%%>');
					}
				);
			}
		});

		var premisesUniqueFields = [
		];
	</script>
