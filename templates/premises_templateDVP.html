<!-- Edit this file to change the layout of the detail view print preview page -->


<div class="panel-heading"><h3 class="panel-title">
	<strong><%%DETAIL_VIEW_TITLE%%></strong>
	<div class="hidden-print pull-right">
		<div class="btn-group">
			<button type="button" id="print" onclick="window.print();" title="<%%TRANSLATION(Print)%%>" class="btn btn-primary"><i class="glyphicon glyphicon-print"></i> <%%TRANSLATION(Print)%%></button>
			<button type="submit" id="back" title="<%%TRANSLATION(Cancel Printing)%%>" class="btn btn-default"><i class="glyphicon glyphicon-remove-circle"></i> <%%TRANSLATION(Cancel Printing)%%></button>
		</div>
	</div>
	<div class="clearfix"></div>
</h3></div>

<div class="panel-body">
	<fieldset class="form-horizontal">
		<!-- Field: Premise Name -->
		<div class="form-group premises-premises_name" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Premise Name</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(premises_name)%%></div>
			</div>
		</div>
		<!-- Field: Latitude -->
		<div class="form-group premises-premises_latitude" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Latitude</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(premises_latitude)%%></div>
			</div>
		</div>
		<!-- Field: Longitude -->
		<div class="form-group premises-premises_longitude" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Longitude</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(premises_longitude)%%></div>
			</div>
		</div>
		<!-- Field: Premises radius -->
		<div class="form-group premises-premises_radius" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Premises radius</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(premises_radius)%%></div>
			</div>
		</div>
		<!-- Field: Premjees Opening -->
		<div class="form-group premises-premjees_opening" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Premjees Opening</label>
			<div class="col-xs-9">
				<div class="form-control-static"><span id="premjees_opening<%%RND1%%>"><%%COMBOTEXT(premjees_opening)%%></span></div>
			</div>
		</div>
		<!-- Field: Premjees closing -->
		<div class="form-group premises-premjees_closing" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Premjees closing</label>
			<div class="col-xs-9">
				<div class="form-control-static"><span id="premjees_closing<%%RND1%%>"><%%COMBOTEXT(premjees_closing)%%></span></div>
			</div>
		</div>
	</fieldset>
</div>
<script>
	$j(function() {
		// render read-only checkboxes in DVP
		$j('form input[type=checkbox]:not(.hidden):checked')
			.addClass('hidden')
			.after('<i class="glyphicon glyphicon-check"></i>');
		$j('form input[type=checkbox]:not(.hidden):not(:checked)')
			.addClass('hidden')
			.after('<i class="glyphicon glyphicon-unchecked"></i>')
	})
</script>
<!-- child records -->
<div class="panel-body">
	<div id="premises-children"></div>
</div>

<script>
	$j(function() {
		/* prevent loading child records in multiple DVP */
		if($j('[id=premises-children]').length > 1) return;

		post(
			'parent-children.php', {
				ParentTable: 'premises',
				SelectedID: '<%%VALUE(premises_id)%%>',
				Operation: 'show-children-printable'
			},
			'premises-children',
			'disable-element',
			'loading-element',
			apply_persisting_children
		);

		$j('form').on('click', '#children-tabs button[data-target]', function() {
			$j(this).toggleClass('active');
			persist_expanded_child($j(this).attr('id'));
		});
	})
</script>
